name: Update fetchmd.js Bundle

on:
  workflow_dispatch:
  push:
    branches:
      - renovate/**
    paths:
      - lib/web-fetch-md/src/**
      - lib/web-fetch-md/package.json
      - lib/web-fetch-md/pnpm-lock.yaml
      - lib/web-fetch-md/tsconfig*.json

concurrency:
  group: update-fetchmd-bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Ensure GitHub App auth is configured (required for workflow-to-workflow triggers)
        # Commits pushed with the default GITHUB_TOKEN will not trigger other workflows
        # (e.g. `pull_request` checks on Renovate PRs). A GitHub App token avoids that limitation
        # and is short-lived + tightly scoped.
        env:
          FETCHMD_BUNDLE_APP_ID: ${{ vars.FETCHMD_BUNDLE_APP_ID }}
          FETCHMD_BUNDLE_APP_PRIVATE_KEY: ${{ secrets.FETCHMD_BUNDLE_APP_PRIVATE_KEY }}
        run: |
          if [ -z "$FETCHMD_BUNDLE_APP_ID" ]; then
            echo "Missing required repo variable: FETCHMD_BUNDLE_APP_ID" >&2
            exit 1
          fi
          if [ -z "$FETCHMD_BUNDLE_APP_PRIVATE_KEY" ]; then
            echo "Missing required secret: FETCHMD_BUNDLE_APP_PRIVATE_KEY" >&2
            exit 1
          fi
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          # Keep credentials out of the working copy; we'll only add auth right before pushing.
          persist-credentials: false
      - name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
      - name: Enable Corepack (pnpm)
        run: corepack enable
      - name: Install deps
        working-directory: lib/web-fetch-md
        run: pnpm install --frozen-lockfile
      - name: Bundle skill script
        working-directory: lib/web-fetch-md
        run: pnpm run bundle:skill
      - name: Detect bundle changes
        id: bundle-diff
        shell: bash
        run: |
          if git diff --quiet -- skills/web-fetch-to-markdown/scripts/fetchmd.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Get last commit info
        id: last-commit
        if: steps.bundle-diff.outputs.changed == 'true' && startsWith(github.ref, 'refs/heads/renovate/')
        run: |
          message="$(git log -1 --pretty=%s)"
          author="$(git log -1 --pretty='%an <%ae>')"

          {
            echo "message<<EOF"
            echo "$message"
            echo "EOF"
            echo "author<<EOF"
            echo "$author"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create GitHub App token
        id: app-token
        if: steps.bundle-diff.outputs.changed == 'true'
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2
        with:
          app-id: ${{ vars.FETCHMD_BUNDLE_APP_ID }}
          private-key: ${{ secrets.FETCHMD_BUNDLE_APP_PRIVATE_KEY }}
      - name: Configure authenticated git remote
        if: steps.bundle-diff.outputs.changed == 'true'
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_APP_TOKEN}@github.com/${{ github.repository }}.git"
      - name: Amend HEAD commit with bundle changes (Renovate)
        if: steps.bundle-diff.outputs.changed == 'true' && startsWith(github.ref, 'refs/heads/renovate/')
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          commit_author: ${{ steps.last-commit.outputs.author }}
          commit_message: ${{ steps.last-commit.outputs.message }}
          file_pattern: skills/web-fetch-to-markdown/scripts/fetchmd.js
          commit_options: "--amend --no-edit"
          push_options: "--force-with-lease"
          skip_fetch: true
      - name: Commit bundle changes (Manual run)
        if: steps.bundle-diff.outputs.changed == 'true' && github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/heads/renovate/')
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          commit_message: "chore(web-fetch-to-markdown): update fetchmd.js bundle"
          file_pattern: skills/web-fetch-to-markdown/scripts/fetchmd.js
