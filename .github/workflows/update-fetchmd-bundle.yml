name: Check fetchmd.js Bundle

on:
  workflow_dispatch:

concurrency:
  group: update-fetchmd-bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup mise
        uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3.6.2
      - name: Enable Corepack (pnpm)
        run: corepack enable
      - name: Install deps
        working-directory: lib/web-fetch-md
        run: pnpm install --frozen-lockfile
      - name: Bundle skill script
        working-directory: lib/web-fetch-md
        run: pnpm run bundle:skill
      - name: Detect bundle changes
        id: bundle-diff
        shell: bash
        run: |
          if git diff --quiet -- skills/web-fetch-to-markdown/scripts/fetchmd.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Fail if bundle is out of date
        if: steps.bundle-diff.outputs.changed == 'true'
        run: |
          echo "fetchmd.js bundle is out of date." >&2
          echo "Run: pnpm -C lib/web-fetch-md run bundle:skill" >&2
          exit 1
