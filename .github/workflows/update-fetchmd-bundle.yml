name: Update fetchmd.js Bundle

on:
  workflow_dispatch:
  push:
    branches:
      - renovate/**
    paths:
      - lib/web-fetch-md/src/**
      - lib/web-fetch-md/package.json
      - lib/web-fetch-md/pnpm-lock.yaml
      - lib/web-fetch-md/tsconfig*.json

concurrency:
  group: update-fetchmd-bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Ensure PAT is configured (required for workflow-to-workflow triggers)
        # Commits pushed with the default GITHUB_TOKEN will not trigger other workflows
        # (e.g. `pull_request` checks on Renovate PRs). A real PAT avoids that limitation.
        env:
          FETCHMD_BUNDLE_PAT: ${{ secrets.FETCHMD_BUNDLE_PAT }}
        run: |
          if [ -z "$FETCHMD_BUNDLE_PAT" ]; then
            echo "Missing required secret: FETCHMD_BUNDLE_PAT" >&2
            echo "Create a PAT (fine-grained is OK) with repo Contents: Read and write, and add it as a repo secret." >&2
            exit 1
          fi
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          persist-credentials: true
          token: ${{ secrets.FETCHMD_BUNDLE_PAT }}
      - name: Setup mise
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3.6.1
      - name: Enable Corepack (pnpm)
        run: corepack enable
      - name: Install deps
        working-directory: lib/web-fetch-md
        run: pnpm install --frozen-lockfile
      - name: Bundle skill script
        working-directory: lib/web-fetch-md
        run: pnpm run bundle:skill
      - name: Detect bundle changes
        id: bundle-diff
        shell: bash
        run: |
          if git diff --quiet -- skills/web-fetch-to-markdown/scripts/fetchmd.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Get last commit info
        id: last-commit
        if: steps.bundle-diff.outputs.changed == 'true' && startsWith(github.ref, 'refs/heads/renovate/')
        run: |
          message="$(git log -1 --pretty=%s)"
          author="$(git log -1 --pretty='%an <%ae>')"

          {
            echo "message<<EOF"
            echo "$message"
            echo "EOF"
            echo "author<<EOF"
            echo "$author"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Amend HEAD commit with bundle changes (Renovate)
        if: steps.bundle-diff.outputs.changed == 'true' && startsWith(github.ref, 'refs/heads/renovate/')
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.FETCHMD_BUNDLE_PAT }}
        with:
          commit_author: ${{ steps.last-commit.outputs.author }}
          commit_message: ${{ steps.last-commit.outputs.message }}
          file_pattern: skills/web-fetch-to-markdown/scripts/fetchmd.js
          commit_options: "--amend --no-edit"
          push_options: "--force-with-lease"
          skip_fetch: true
      - name: Commit bundle changes (Manual run)
        if: steps.bundle-diff.outputs.changed == 'true' && github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/heads/renovate/')
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.FETCHMD_BUNDLE_PAT }}
        with:
          commit_message: "chore(web-fetch-to-markdown): update fetchmd.js bundle"
          file_pattern: skills/web-fetch-to-markdown/scripts/fetchmd.js
