name: Validate Skills

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@v3

      - name: Validate skills
        run: bash scripts/validate-skills.sh

  check-fetchmd-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.2.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: lib/web-fetch-md/pnpm-lock.yaml

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install deps
        run: pnpm -C lib/web-fetch-md install --frozen-lockfile

      - name: Bundle skill script
        run: pnpm -C lib/web-fetch-md run bundle:skill

      - name: Check bundle is committed
        shell: bash
        run: |
          if git diff --exit-code -- skills/web-fetch-to-markdown/scripts/fetchmd.js; then
            exit 0
          fi

          echo "fetchmd.js bundle is out of date." >&2
          echo "Run: pnpm -C lib/web-fetch-md run bundle:skill" >&2
          exit 1
